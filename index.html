<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CSA Plateau — Gestion Médicale v2</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://wsnehnempnexzxzuklbv.supabase.co wss://wsnehnempnexzxzuklbv.supabase.co; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --marine:#0D2B45;--vert:#1A6B3C;--rouge:#8B1A1A;--or:#C9A646;
  --bleu:#1F4E79;--violet:#4B0082;--orang:#7F3F00;--cyan:#006064;
  --fpm:#2E7D32;--cmu:#1565C0;--na:#6D4C41;--stage:#6A1B9A;
  --bg:#eef3f8;--card:#fff;--border:#d6dde8;--text:#1a1a2e;--muted:#667084;
  --r:10px;--sh:0 2px 10px rgba(13,43,69,.08);
  --or-soft:#f7efd9;--marine-soft:#eaf1f8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(180deg,#f6f8fb 0%,var(--bg) 100%);color:var(--text);font-size:13px;}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--marine),#1a3a5c);display:flex;align-items:center;justify-content:center;z-index:1000;}
.auth-box{background:#fff;border-radius:16px;padding:32px 36px;width:420px;max-height:90vh;overflow-y:auto;}
.auth-box{border:1px solid #e5c97a;box-shadow:0 8px 24px rgba(0,0,0,.18);}
.auth-logo{text-align:center;font-size:40px;margin-bottom:8px;}
.brand-logo{width:64px;height:64px;object-fit:contain;display:block;margin:0 auto 8px auto;filter:drop-shadow(0 1px 2px rgba(0,0,0,.18));}
.auth-title{text-align:center;font-size:18px;font-weight:700;color:var(--marine);margin-bottom:4px;}
.auth-sub{text-align:center;font-size:11px;color:var(--muted);margin-bottom:20px;}
.agent-list{display:grid;gap:8px;margin-bottom:16px;}
.agent-btn{padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;background:#fff;display:flex;align-items:center;gap:10px;transition:all .2s;}
.agent-btn:hover{border-color:var(--marine);background:#f0f4ff;}
.agent-btn.selected{border-color:var(--marine);background:#EBF3FB;}
.agent-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.agent-name{font-size:12px;font-weight:700;color:var(--marine);}
.agent-role{font-size:10px;color:var(--muted);}
.pin-section{margin-top:12px;}
.pin-label{font-size:11px;font-weight:700;color:var(--marine);margin-bottom:6px;}
.pin-dots{display:flex;gap:8px;justify-content:center;margin-bottom:12px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#f0f0f0;border:2px solid var(--border);transition:all .2s;}
.pin-dot.filled{background:var(--marine);border-color:var(--marine);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pin-key{padding:14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:16px;font-weight:700;background:#fff;text-align:center;transition:all .15s;color:var(--marine);}
.pin-key:hover{background:var(--marine);color:#fff;}
.pin-key:active{transform:scale(.95);}
.pin-error{color:var(--rouge);text-align:center;font-size:12px;margin-top:8px;height:18px;}

/* ── APP ── */
#app{display:none;height:100vh;flex-direction:column;}
.topbar{background:var(--marine);color:#fff;padding:0 18px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar{background:linear-gradient(90deg,#0D2B45 0%,#123a5c 65%,#1b486f 100%);border-bottom:2px solid var(--or);}
.topbar-l{display:flex;align-items:center;gap:12px;}
.topbar-logo{width:30px;height:30px;object-fit:contain;border-radius:4px;background:#ffffff12;padding:2px;}
.topbar h1{font-size:13px;font-weight:700;}
.topbar h1 em{color:#FFD700;font-style:normal;}
.topbar-r{display:flex;align-items:center;gap:10px;font-size:11px;}
.agent-chip{background:rgba(255,215,0,.2);color:#FFD700;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.agent-chip{border:1px solid rgba(255,215,0,.35);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;display:inline-block;margin-right:4px;}
.sync-dot.off{background:#FF9800;} .sync-dot.sync{background:#2196F3;animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-out{padding:3px 10px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;border-radius:12px;cursor:pointer;font-size:11px;}
.btn-out:hover{background:rgba(255,255,255,.12);}
.btn-compact{padding:3px 10px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.08);color:#fff;border-radius:12px;cursor:pointer;font-size:11px;}
.btn-compact.active{background:rgba(201,166,70,.24);border-color:rgba(201,166,70,.7);color:#ffe8a6;}

/* ── NOTIFICATIONS ── */
#notif-bar{background:#FF6F00;color:#fff;text-align:center;padding:5px;font-size:11px;font-weight:700;display:none;}
.notif-badge{position:fixed;top:60px;right:16px;background:var(--rouge);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;z-index:100;display:none;}

/* ── NAV ── */
.mod-nav{background:#fff;border-bottom:2px solid var(--border);display:flex;gap:0;overflow-x:auto;flex-shrink:0;}
.mod-tab{padding:11px 18px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;}
.mod-tab.active{color:var(--marine);border-bottom-color:var(--or);}
.mod-tab:hover{color:var(--marine);background:var(--marine-soft);}

/* ── LAYOUT ── */
.content{flex:1;overflow-y:auto;padding:14px 18px;}
.card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px;}
.card{border:1px solid var(--border);}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--marine);border-left:4px solid var(--or);padding-left:8px;margin-bottom:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:800px){.g2,.g3,.g4{grid-template-columns:1fr 1fr;}}

/* ── KPI ── */
.kpi{background:linear-gradient(180deg,#ffffff 0%,#fbfdff 100%);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh);border-left:4px solid var(--marine);border:1px solid var(--border);}
.kpi-ico{font-size:20px;margin-bottom:3px;}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.kpi-val{font-size:20px;font-weight:800;line-height:1.1;}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px;}

/* ── FORMULAIRE ── */
.fs{background:#f8fbff;border:1px solid #e6edf5;border-radius:8px;padding:12px;margin-bottom:10px;}
.fs-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.fr{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.fr label{flex:1;font-size:12px;font-weight:600;color:#444;}
.fr input,.fr select,.fr textarea{padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;background:#fff;}
.fr input[type=number]{width:90px;text-align:right;}
.fr input[type=text],.fr select{flex:1;}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--or);outline:none;box-shadow:0 0 0 2px rgba(201,166,70,.15);}
.fr textarea{flex:1;resize:vertical;min-height:50px;}
.tb{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;white-space:nowrap;}
.tb-fpm{background:#e8f5e9;color:var(--fpm);}
.tb-cmu{background:#e3f2fd;color:var(--cmu);}
.tb-na{background:#efebe9;color:var(--na);}
.tb-stage{background:#f3e5f5;color:var(--stage);}
.tl{display:flex;justify-content:space-between;padding:7px 0;border-top:1px dashed var(--border);font-size:12px;color:#555;}
.tl strong{color:var(--marine);font-size:14px;}
.tl.sub{border-top:none;padding-top:3px;}

/* ── BOUTONS ── */
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s;}
.btn-primary{background:var(--marine);color:#fff;}
.btn-primary:hover{background:#1a3a5c;box-shadow:0 2px 8px rgba(13,43,69,.22);}
.btn-success{background:var(--vert);color:#fff;}
.btn-success:hover{background:#145029;}
.btn-warn{background:var(--or);color:#2a1f00;}
.btn-danger{background:transparent;color:var(--rouge);border:1.5px solid var(--rouge);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-print{background:#f0f0f0;color:var(--marine);border:1px solid var(--border);}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}

/* ── TABLE ── */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:var(--marine);color:#fff;padding:7px 9px;text-align:left;font-size:10px;font-weight:600;white-space:nowrap;}
th{border-bottom:1px solid #0a2237;}
td{padding:6px 9px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tr:hover td{background:#f8fbff;}
.tr-tot td{background:#FFF8E1;font-weight:700;border-top:2px solid var(--or);}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.b-fpm{background:#e8f5e9;color:var(--fpm);}
.b-cmu{background:#e3f2fd;color:var(--cmu);}
.b-na{background:#efebe9;color:var(--na);}
.b-stage{background:#f3e5f5;color:var(--stage);}
.b-ok{background:#e8f5e9;color:#2E7D32;}.b-warn{background:#FFF8E1;color:#B8860B;}.b-err{background:#ffebee;color:#C62828;}

/* ── ALERTE ── */
.al{padding:9px 12px;border-radius:8px;margin-bottom:8px;font-size:12px;}
.al-warn{background:#fff8e5;border-left:4px solid var(--or);}
.al-ok{background:#E8F5E9;border-left:4px solid var(--vert);}
.al-err{background:#FFEBEE;border-left:4px solid var(--rouge);}
.al-info{background:#eaf4ff;border-left:4px solid var(--cmu);}
.al strong{display:block;margin-bottom:2px;font-size:12px;}

/* ── STOCK BARS ── */
.sk-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5;}
.sk-name{flex:1;font-size:11px;font-weight:600;}
.sk-bw{width:90px;background:#f0f0f0;border-radius:4px;height:8px;overflow:hidden;flex-shrink:0;}
.sk-bar{height:100%;border-radius:4px;}
.sk-qty{width:70px;text-align:right;font-size:11px;font-weight:700;flex-shrink:0;}

/* ── REÇU ── */
.recu{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;font-size:11px;max-width:320px;font-family:monospace;}
.recu-brand{display:flex;justify-content:center;margin-bottom:6px;}
.recu-brand img{width:34px;height:34px;object-fit:contain;}
.recu-title{text-align:center;font-weight:700;font-size:13px;margin-bottom:4px;}
.recu-line{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed #eee;}
.recu-tot{display:flex;justify-content:space-between;font-weight:700;font-size:13px;padding-top:7px;border-top:2px solid #333;margin-top:4px;}

/* ── CONSTANTES ── */
.const-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0;}
.const-item{background:#f0f4ff;border-radius:8px;padding:10px;text-align:center;}
.const-val{font-size:20px;font-weight:800;color:var(--marine);}
.const-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;}
.imc-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-top:4px;}

/* ── SEARCH ── */
.sb{display:flex;gap:8px;margin-bottom:10px;}
.sb input{flex:1;padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;}
.sb input:focus{border-color:var(--marine);outline:none;}
.pat-card{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;margin-bottom:6px;}
.pat-card:hover{border-color:var(--or);background:#f7fbff;}
.pat-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:12px;padding:20px 24px;width:500px;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;color:var(--marine);margin-bottom:14px;}
.modal-close{float:right;cursor:pointer;font-size:18px;color:var(--muted);}

@media print{
  .topbar,.mod-nav,.btn-row,.btn,.no-print{display:none!important;}
  .card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;}
  body{background:#fff;}
}
canvas{max-height:180px;}

/* ── MODE COMPACT ── */
body.compact .content{padding:8px 10px;}
body.compact .card{padding:10px;margin-bottom:8px;}
body.compact .card-title{font-size:10px;margin-bottom:8px;}
body.compact .mod-tab{padding:8px 12px;font-size:11px;}
body.compact .kpi{padding:8px 10px;}
body.compact .kpi-val{font-size:17px;}
body.compact .fs{padding:8px;margin-bottom:7px;}
body.compact .fr{gap:6px;margin-bottom:5px;}
body.compact .fr label{font-size:11px;}
body.compact .fr input,body.compact .fr select,body.compact .fr textarea{padding:4px 7px;font-size:11px;}
body.compact .btn{padding:6px 10px;font-size:11px;}
body.compact th{padding:5px 7px;font-size:9px;}
body.compact td{padding:4px 7px;font-size:10px;}
body.compact .pat-card{padding:7px 9px;margin-bottom:4px;}
body.compact #content[data-view="soins-actes"] .g2,
body.compact #content[data-view="cpt-caisse"] .g2{gap:8px;}
</style>
</head>
<body>

<div id="notif-bar"></div>

<!-- ══════════ AUTH SCREEN ══════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <img class="brand-logo" id="auth-logo" alt="Logo établissement">
    <div class="auth-logo" id="auth-logo-fallback" style="display:none">🏥</div>
    <div class="auth-title">CSA — Garde Républicaine du Plateau</div>
    <div class="auth-sub">Connexion sécurisée au compte professionnel</div>
    <form id="auth-form" onsubmit="authLogin(event)">
      <div class="fr"><label for="auth-email">Adresse email</label><input type="email" id="auth-email" autocomplete="username" required></div>
      <div class="fr"><label for="auth-password">Mot de passe</label><input type="password" id="auth-password" autocomplete="current-password" minlength="8" required></div>
      <button class="btn btn-primary" id="auth-submit" type="submit" style="width:100%;margin-top:10px">Se connecter</button>
      <div class="pin-error" id="auth-error" role="alert"></div>
    </form>
  </div>
</div>

<!-- ══════════ MFA MÉDECIN-CHEF ══════════ -->
<div id="mfa-screen" style="display:none;position:fixed;inset:0;background:linear-gradient(135deg,var(--marine),#1a3a5c);align-items:center;justify-content:center;z-index:1100">
  <div class="auth-box">
    <div class="auth-title">Sécurité Médecin-Chef</div>
    <div class="auth-sub" id="mfa-instructions">Validation du second facteur obligatoire</div>
    <div id="mfa-qr-zone" style="display:none;text-align:center;margin:12px 0">
      <img id="mfa-qr" alt="QR code MFA" style="width:190px;height:190px;border:8px solid white">
      <div style="font-size:10px;color:var(--muted);margin-top:8px">Scannez avec Google Authenticator, Microsoft Authenticator ou Authy.</div>
      <div id="mfa-secret" style="font-family:monospace;font-size:11px;word-break:break-all;margin-top:6px"></div>
    </div>
    <form onsubmit="verifyChiefMfa(event)">
      <div class="fr"><label for="mfa-code">Code à 6 chiffres</label><input id="mfa-code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required></div>
      <button class="btn btn-primary" id="mfa-submit" type="submit" style="width:100%">Valider</button>
      <button class="btn btn-out" type="button" onclick="logout()" style="width:100%;margin-top:8px;color:var(--marine);border-color:var(--border)">Annuler et se déconnecter</button>
      <div class="pin-error" id="mfa-error" role="alert"></div>
    </form>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-l">
      <img class="topbar-logo" id="top-logo" alt="Logo établissement">
      <span id="top-logo-fallback" style="font-size:20px;display:none">🏥</span>
      <h1>CSA Plateau — <em id="mod-title">Module</em></h1>
    </div>
    <div class="topbar-r">
      <span class="agent-chip" id="agent-chip">—</span>
      <span onclick="retrySync()" style="cursor:pointer" title="Cliquer pour relancer la synchronisation"><span class="sync-dot" id="sync-dot"></span><span id="sync-lbl">En ligne</span></span>
      <button class="btn-compact" id="compact-toggle" onclick="toggleCompactMode()">Compact</button>
      <span id="clock-top" style="opacity:.7"></span>
      <button class="btn-out" onclick="logout()">Déconnexion</button>
    </div>
  </div>
  <div class="mod-nav" id="mod-nav"></div>
  <div class="content" id="content"></div>
</div>

<script src="app.js"></script>
</body>
</html>
