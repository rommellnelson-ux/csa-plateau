<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tests CSA Plateau</title>
<style>
  body{font-family:system-ui,Arial,sans-serif;padding:18px;color:#1a1a2e;max-width:760px;margin:0 auto}
  h1{font-size:18px}
  #sum{font-size:18px;font-weight:700;margin:12px 0;padding:10px;border-radius:8px}
  #sum.pass{background:#e8f5e9;color:#1a6b3c}
  #sum.fail{background:#fbeaea;color:#8b1a1a}
  ul{list-style:none;padding:0}
  li{margin:3px 0;font-size:13px}
  li.pass{color:#1a6b3c}
  li.fail{color:#8b1a1a;font-weight:700}
  .muted{color:#667084;font-size:12px}
</style>
</head>
<body>
<h1>Tests automatiques — CSA Plateau</h1>
<p class="muted">Charge <code>index.html</code> dans un cadre masqué et exécute des assertions sur les fonctions réelles, dans le contexte de l'application. Aucune donnée n'est écrite dans le cloud (localStorage du cadre uniquement, nettoyé).</p>
<div id="sum">Chargement de l'application…</div>
<ul id="list"></ul>
<iframe id="app" src="index.html" style="width:0;height:0;border:0;position:absolute;left:-9999px"></iframe>
<script>
// Le corps des tests s'exécute DANS le contexte de l'iframe (eval) pour voir
// les const (escHtml, VIEW, ...) qui ne sont pas exposées sur window.
const TEST_SRC = `(function(){
  const results=[];
  const ok=(name,cond)=>results.push({name,pass:!!cond});
  try{
    ok('numFR accepte la virgule (72,5)', numFR('72,5')===72.5);
    ok('numFR vide = 0', numFR('')===0);
    ok('tailleCm metres 1,75 -> 175', tailleCm('1,75')===175);
    ok('tailleCm cm 175 -> 175', tailleCm('175')===175);
    ok('tailleCm point 1.75 -> 175', tailleCm('1.75')===175);
    ok('EAN valide accepte', isValidEan('5901234123457')===true);
    ok('EAN mauvaise cle rejete', isValidEan('5901234123450')===false);
    ok('EAN vide accepte', isValidEan('')===true);
    ok('escHtml neutralise <', escHtml('<img onerror=x>').indexOf('<')===-1);
    ok('escSQ est une fonction', typeof escSQ==='function');
    ok('encaissement arrondi entier', Math.round(3*2.5)===8);
    const si=sevciIndic();
    ok('sevciIndic renvoie une structure', si && typeof si.total==='number' && typeof si.pctSupp==='number');

    CURRENT_AGENT={id:'M',nom:'M',module:'sevci',permissions:['sevci_data'],isChef:false};
    const tabs=getAllowedTabs();
    ok('sevci voit la file active', tabs.includes('sevci-file'));
    ok('sevci NE voit PAS la pharmacie', !tabs.includes('pha-stock'));
    ok('sevci NE voit PAS la compta', !tabs.includes('cpt-caisse'));

    CURRENT_AGENT={id:'T',nom:'T',module:'chef',permissions:['chef'],isChef:true};
    let rendered=0; const rerr=[];
    Object.keys(VIEW).forEach(k=>{ const d=document.createElement('div'); try{VIEW[k](d);rendered++;}catch(e){rerr.push(k);} });
    ok('toutes les vues rendent ('+rendered+'/'+Object.keys(VIEW).length+')'+(rerr.length?' KO:'+rerr.join(','):''), rerr.length===0);

    localStorage.setItem('csa2_patients', JSON.stringify([{id:'x',nom:'<img src=x onerror=alert(1)>',genre:'M',statut:'NA',created_at:new Date().toISOString()}]));
    const dd=document.createElement('div'); try{VIEW['chef-patients'](dd);}catch(e){}
    ok('XSS nom patient echappe', dd.innerHTML.indexOf('<img src=x onerror')===-1);
    localStorage.removeItem('csa2_patients');

    // ─── Règle prix pharmacie (commit 957f313/1411238) : produit sans tarif validé ───
    ok('needsPriceValidation: px_cession 0 -> a valider', needsPriceValidation({px_cession:0})===true);
    ok('needsPriceValidation: prix positif -> ok', needsPriceValidation({px_cession:500})===false);
    ok('needsPriceValidation: A_VALIDER force malgre prix', needsPriceValidation({px_cession:500,price_status:'A_VALIDER'})===true);
    ok('needsPriceValidation: produit cree sans prix (hors chef) -> a valider', needsPriceValidation({})===true);

    // ─── Synchro v2 : idempotence (client_event_id) ───
    ok('newClientEventId: format UUID v4', /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(newClientEventId()));
    ok('newClientEventId: 2 appels = 2 cles distinctes', newClientEventId()!==newClientEventId());

    // ─── Repli anti-outage : cache de schema PostgREST inconnu ───
    ok('csaIsCacheErr: code PGRST204 -> repli', csaIsCacheErr({code:'PGRST204'})===true);
    ok('csaIsCacheErr: message schema cache -> repli', csaIsCacheErr({message:"Could not find the 'client_event_id' column in the schema cache"})===true);
    ok('csaIsCacheErr: doublon 23505 -> PAS un cache err', csaIsCacheErr({code:'23505'})===false);
    ok('csaIsCacheErr: permission denied -> PAS un cache err', csaIsCacheErr({message:'permission denied'})===false);
    ok('csaStripCev retire client_event_id', csaStripCev({a:1,client_event_id:'x'}).client_event_id===undefined);
    ok('csaStripCev conserve les autres champs', csaStripCev({a:1,client_event_id:'x'}).a===1);
    { const src={client_event_id:'x'}; csaStripCev(src); ok('csaStripCev ne mute pas la source', src.client_event_id==='x'); }

    // ─── Commit atomique (csa_commit) : detection fonction absente -> repli per-row ───
    ok('csaIsMissingFn: PGRST202 -> repli per-row', csaIsMissingFn({code:'PGRST202'})===true);
    ok('csaIsMissingFn: message fonction absente -> repli per-row', csaIsMissingFn({message:'Could not find the function public.csa_commit'})===true);
    ok('csaIsMissingFn: cache err != fonction absente', csaIsMissingFn({code:'PGRST204'})===false);

    // ─── toCloudRow : propage la cle d'idempotence + forme de l'event ───
    { const r=toCloudRow({table:'transactions',item:{id:'T1',client_event_id:'CEV-1',created_at:'2026-06-30T00:00:00Z'}});
      ok('toCloudRow: client_event_id propage (SYNC_V2)', r.client_event_id==='CEV-1');
      ok('toCloudRow: event_key = table:id', r.event_key==='transactions:T1');
      ok('toCloudRow: payload.synced force a true', r.payload.synced===true);
      ok('toCloudRow: created_at preserve', r.created_at==='2026-06-30T00:00:00Z'); }

    // ─── Groupe atomique : une table MUTABLE ne rejoint JAMAIS un groupe (anti-ecrasement) ───
    ok('MUTABLE_TABLES contient pharma_stock', MUTABLE_TABLES.includes('pharma_stock'));
    { const savedQ=SYNC_Q.slice(), savedGrp=CSA_GROUP;
      try{
        CSA_GROUP='grp_test'; SYNC_Q=[];
        queueSync('pharma_mouvements',{id:'MV1'}); // immuable -> estampille
        queueSync('pharma_stock',{id:'ST1'});       // mutable -> jamais estampille
        const mv=SYNC_Q.find(o=>o.table==='pharma_mouvements');
        const st=SYNC_Q.find(o=>o.table==='pharma_stock');
        ok('groupe: event immuable estampille grp', !!mv && mv.grp==='grp_test');
        ok('groupe: table mutable JAMAIS estampillee', !!st && st.grp===undefined);
        ok('queueSync: chaque op recoit un client_event_id', !!mv && /[0-9a-f-]{36}/i.test(mv.item.client_event_id||''));
      } finally { SYNC_Q=savedQ; CSA_GROUP=savedGrp; localStorage.setItem('csa2_sq',JSON.stringify(SYNC_Q)); }
    }

    // ─── Stock jamais negatif (front) : FEFO + survente bloquee ───
    { const med={id:'Mx',nom:'X',stock:10};
      const lots=[{id:'L2',med_id:'Mx',quantite:5,date_peremption:'2027-01-01',created_at:'b'},
                  {id:'L1',med_id:'Mx',quantite:5,date_peremption:'2026-08-01',created_at:'a'}];
      const alloc=consumeLots(med,lots,3);
      ok('FEFO: consomme le lot perimant le plus tot en premier', alloc[0].lot_id==='L1'); }
    { let threw=false; try{ consumeLots({id:'My',nom:'Y',stock:0},[{id:'L',med_id:'My',quantite:2,date_peremption:'2027-01-01'}],10); }catch(e){ threw=true; }
      ok('Survente bloquee: consumeLots jette si lots insuffisants', threw===true); }

    // ─── Option B (stock dérivé) : deriveStock = stock_apres du dernier mouvement ───
    { const mvs=[
        {med_id:'A',stock_apres:'10',created_at:'2026-07-01T08:00:00Z'},
        {med_id:'A',stock_apres:'7', created_at:'2026-07-01T09:00:00Z'},
        {med_id:'B',stock_apres:'3', created_at:'2026-07-01T08:30:00Z'}];
      ok('deriveStock: solde = dernier stock_apres (med A -> 7)', deriveStock('A',mvs)===7);
      ok('deriveStock: med B -> 3', deriveStock('B',mvs)===3);
      ok('deriveStock: med sans mouvement -> 0', deriveStock('Z',mvs)===0); }
  }catch(e){ ok('exception fatale: '+e.message, false); }
  return results;
})()`;

function render(results){
  const fails=results.filter(r=>!r.pass).length;
  const sum=document.getElementById('sum');
  sum.textContent=(fails===0?'✅ TOUS PASS':'❌ '+fails+' ECHEC(S)')+' — '+results.length+' tests';
  sum.className=fails===0?'pass':'fail';
  document.getElementById('list').innerHTML=results.map(r=>`<li class="${r.pass?'pass':'fail'}">${r.pass?'✔':'✗'} ${r.name}</li>`).join('');
  document.title=fails===0?'TESTS_PASS':'TESTS_FAIL';
  window.__TESTS__={total:results.length,fails:fails};
}
let __tries=0;
function tryRun(){
  __tries++;
  const w=document.getElementById('app').contentWindow;
  let ready=false;
  try{ ready = w && w.eval('typeof numFR==="function" && typeof VIEW!=="undefined"'); }catch(e){ ready=false; }
  if(ready){
    try{ render(w.eval(TEST_SRC)); }
    catch(e){ render([{name:"Impossible d'exécuter les tests: "+e.message,pass:false}]); }
    return;
  }
  if(__tries>50){ render([{name:'Application non chargée (timeout)',pass:false}]); return; }
  setTimeout(tryRun,200);
}
tryRun();
</script>
</body>
</html>
